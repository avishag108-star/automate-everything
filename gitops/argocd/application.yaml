# ─────────────────────────────────────────────────────────────
# ArgoCD Application — the heart of GitOps
# ArgoCD watches THIS repo. When values.yaml changes (new image
# tag from GitHub Actions), ArgoCD auto-deploys within 3 minutes.
# ─────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: statuswatch
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/statuswatch-gitops-platform
    targetRevision: main
    path: k8s/helm

  destination:
    server: https://kubernetes.default.svc
    namespace: statuswatch

  syncPolicy:
    automated:
      prune: true      # Remove resources that are no longer in Git
      selfHeal: true   # Revert manual changes made directly on the cluster
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
