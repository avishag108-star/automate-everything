replicaCount: 2   # 2 replicas = High Availability

image:
  repository: ghcr.io/YOUR_GITHUB_USERNAME/statuswatch-gitops-platform/statuswatch
  pullPolicy: IfNotPresent
  tag: "latest"    # ← GitHub Actions updates this automatically on every push

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: "traefik"   # k3s uses Traefik by default
  hosts:
    - host: statuswatch.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10

autoscaling:
  enabled: false   # Enable HPA in week 2 if time allows
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

env:
  - name: APP_VERSION
    value: "1.0.0"
